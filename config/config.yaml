artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  bucket_name: car-price-prediction-system
  object_name: car_data.csv
  local_data_file: artifacts/data_ingestion/car_data.csv

data_validation:
  root_dir: artifacts/data_validation
  data_file: artifacts/data_ingestion/car_data.csv
  status_file: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation/data
  data_file: artifacts/data_ingestion/car_data.csv
  train_data_file_path: artifacts/data_transformation/data/train.csv
  test_data_file_path: artifacts/data_transformation/data/test.csv
  preprocessor_obj_file_path: artifacts/data_transformation/preprocessor.joblib

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_file_path: artifacts/data_transformation/data/train.csv
  mlflow_tracking_uri: sqlite:///mlflow.db
  experiment_name: Car_Price_Prediction

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_file_path: artifacts/data_transformation/data/test.csv
  model_dir: artifacts/model_trainer
  best_model_path: artifacts/model_evaluation/best_model.joblib
  mlflow_tracking_uri: sqlite:///mlflow.db
  experiment_name: Car_Price_Prediction
